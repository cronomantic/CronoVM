name: CI

on:
  push:
    branches: [main]
  pull_request:

# Opt into Node.js 24 for JavaScript actions ahead of the June 2026
# default flip. Avoids the deprecation warning that actions/checkout@v4
# and msys2/setup-msys2@v2 emit while they still ship Node 20 manifests.
# When upstream actions advertise v5+ on Node 24, this flag becomes a
# no-op and can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [clang, gcc]
    name: linux-${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4

      # Ubuntu 24.04 ships clang-18 by default. clang-18 -O1 emits
      # ~10% more IR instructions per function than clang-21+, and
      # cvm_float64.h's cvm_d_add doesn't fit in the translator's
      # 245-slot SSA register budget under that inflation
      # (`ran out of registers` error). Bumping to clang-21 from
      # apt.llvm.org gives IR shape comparable to the maintainer's
      # local LLVM 22 and clears the limit.
      #
      # The translator's C++ shim (llvm_c_compat.cpp) papers over
      # LLVMGetSwitchCaseValue's late arrival in upstream llvm-c, so
      # the LLVM-C header version doesn't matter; we pick clang-21
      # purely for IR-shape compatibility.
      - name: Install LLVM 21 + toolchain
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  linux-no-stdlib-fallback:
    runs-on: ubuntu-latest
    name: linux-no-stdlib-fallback
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21 + toolchain
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-21 100
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100
          sudo apt-get install -y cmake ninja-build

      # The embedded "no libc allocator" gate. Built defines
      # CVM_NO_STDLIB_FALLBACK across the whole tree, so libcvm's
      # cvm_int_alloc returns NULL when no allocator hook is supplied.
      # We can't run the full suite (e2e_add etc. use the default
      # allocator path), but e2e_allocator exercises the hook end-to-end
      # — that's the test that validates the gate works.
      #
      # `>-` folds same-indent lines with a space and strips the final
      # newline. The previous `>` form with extra indentation on the
      # continuation lines broke because YAML folded scalars preserve
      # *increased* indentation as literal newlines (each -D became its
      # own line and the shell tried to exec it).
      - name: Configure (CVM_NO_STDLIB_FALLBACK)
        run: >-
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_C_FLAGS=-DCVM_NO_STDLIB_FALLBACK

      - name: Build
        run: cmake --build build

      # Only e2e_allocator exercises a non-stdlib alloc path — the rest
      # of the e2e suite uses cvm_load() with no hook, which under this
      # gate intentionally hard-fails. ctest auto-runs the bc + bin
      # fixture-setup tests because e2e_allocator declares them as
      # FIXTURES_REQUIRED.
      - name: Test (allocator-hook path only)
        run: ctest --test-dir build --output-on-failure -R e2e_allocator

  windows:
    runs-on: windows-latest
    name: windows-ucrt64-clang
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      # The local dev environment is MSYS2 UCRT64; match it on CI so
      # llvm-config / clang behave identically to what the maintainer
      # tests against.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos:
    runs-on: macos-latest
    name: macos-clang
    steps:
      - uses: actions/checkout@v4

      # Apple Clang ships without llvm-config (it's part of an internal
      # toolchain). Brew's LLVM keg gets the standalone tools, including
      # llvm-config and a clang that supports --target=i386-elf for
      # fixture compilation.
      - name: Install LLVM via brew
        run: |
          brew update
          brew install llvm cmake ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
