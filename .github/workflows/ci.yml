name: CI

on:
  push:
    branches: [main]
  pull_request:

# Opt into Node.js 24 for JavaScript actions ahead of the June 2026
# default flip. Avoids the deprecation warning that actions/checkout@v4
# and msys2/setup-msys2@v2 emit while they still ship Node 20 manifests.
# When upstream actions advertise v5+ on Node 24, this flag becomes a
# no-op and can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [clang, gcc]
    name: linux-${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # external/picolibc: the conformance test
                                   # builds picolibc.bc from it (else it fails)
          # NB: this job runs the FULL ctest, including the C++ STL conformance
          # fixtures (conf_pico_cpp_*) which compile with `-stdlib=libc++`, so
          # libc++ must be installed below. Our freestanding <__config_site> is
          # written against libc++ 22 (the maintainer's local toolchain); if
          # Ubuntu's default clang/libc++ (currently 18) skews the knobs, pin
          # clang-21 + libc++-21 via apt.llvm.org.

      # Ubuntu 24.04 ships clang-18 by default. clang-18 -O1 emits
      # ~10% more IR instructions per function than clang-21+, and
      # cvm_float64.h's cvm_d_add doesn't fit in the translator's
      # 245-slot SSA register budget under that inflation
      # (`ran out of registers` error). Bumping to clang-21 from
      # apt.llvm.org gives IR shape comparable to the maintainer's
      # local LLVM 22 and clears the limit.
      #
      # The translator's C++ shim (llvm_c_compat.cpp) papers over
      # LLVMGetSwitchCaseValue's late arrival in upstream llvm-c, so
      # the LLVM-C header version doesn't matter; we pick clang-21
      # purely for IR-shape compatibility.
      # llvm-dev pulls headers + libs for the translator's LLVM-C
      # bindings; clang is needed at fixture-build time even on the GCC
      # row, because tools/translator/CMakeLists.txt resolves a separate
      # clang binary for `--target=i386-elf -emit-llvm`. The translator's
      # C++ shim (llvm_c_compat.cpp) papers over LLVMGetSwitchCaseValue's
      # absence in older LLVM-C headers, and the new block-local SSA
      # register reuse in the translator keeps even clang-18's inflated
      # IR within budget — so the system's default LLVM is enough.
      - name: Install LLVM + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm llvm-dev \
              libc++-dev libc++abi-dev cmake ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  linux-no-stdlib-fallback:
    runs-on: ubuntu-latest
    name: linux-no-stdlib-fallback
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # external/picolibc: the conformance test
                                   # builds picolibc.bc from it (else it fails)

      # llvm-dev pulls headers + libs for the translator's LLVM-C
      # bindings; clang is needed at fixture-build time even on the GCC
      # row, because tools/translator/CMakeLists.txt resolves a separate
      # clang binary for `--target=i386-elf -emit-llvm`. The translator's
      # C++ shim (llvm_c_compat.cpp) papers over LLVMGetSwitchCaseValue's
      # absence in older LLVM-C headers, and the new block-local SSA
      # register reuse in the translator keeps even clang-18's inflated
      # IR within budget — so the system's default LLVM is enough.
      - name: Install LLVM + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm llvm-dev cmake ninja-build

      # The embedded "no libc allocator" gate. Built defines
      # CVM_NO_STDLIB_FALLBACK across the whole tree, so libcvm's
      # cvm_int_alloc returns NULL when no allocator hook is supplied.
      # We can't run the full suite (e2e_add etc. use the default
      # allocator path), but e2e_allocator exercises the hook end-to-end
      # — that's the test that validates the gate works.
      #
      # `>-` folds same-indent lines with a space and strips the final
      # newline. The previous `>` form with extra indentation on the
      # continuation lines broke because YAML folded scalars preserve
      # *increased* indentation as literal newlines (each -D became its
      # own line and the shell tried to exec it).
      - name: Configure (CVM_NO_STDLIB_FALLBACK)
        run: >-
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_C_FLAGS=-DCVM_NO_STDLIB_FALLBACK

      - name: Build
        run: cmake --build build

      # Only e2e_allocator exercises a non-stdlib alloc path — the rest
      # of the e2e suite uses cvm_load() with no hook, which under this
      # gate intentionally hard-fails. ctest auto-runs the bc + bin
      # fixture-setup tests because e2e_allocator declares them as
      # FIXTURES_REQUIRED.
      - name: Test (allocator-hook path only)
        run: ctest --test-dir build --output-on-failure -R e2e_allocator

  linux-cortex-m-sanity:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # thumbv7m covers Cortex-M3/M4/M7; thumbv6m covers M0/M0+/
        # RP2040; riscv32-rv32imc covers most 32-bit RISC-V MCUs
        # (ESP32-C3, CH32V103/203, GD32VF103, BL602, etc.). All
        # three share the same allowlist
        # (cmake/cortex_m_allowed_symbols.txt) — ARM EABI helpers
        # land under the __aeabi_* wildcard, RISC-V soft-float
        # helpers under explicit __addsf3/__divsf3/__floatsisf/…
        # entries, and the Thumb-1 switch-jump helper under
        # __gnu_thumb1_*.
        target:
          - { name: thumbv7m, toolchain: thumbv7m-none-eabi.cmake, build: build-armv7m }
          - { name: thumbv6m, toolchain: thumbv6m-none-eabi.cmake, build: build-armv6m }
          - { name: rv32imc,  toolchain: riscv32-none-elf.cmake,   build: build-rv32imc }
    name: linux-cortex-m-sanity-${{ matrix.target.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # external/picolibc: the conformance test
                                   # builds picolibc.bc from it (else it fails)

      # gcc-arm-none-eabi: arm-none-eabi-gcc covers both thumbv7m
      # and thumbv6m via -mcpu= flags. Ships newlib headers bundled,
      # so <math.h> for sqrtf is on the include path automatically.
      #
      # gcc-riscv64-unknown-elf: bare-metal RISC-V cross-compiler.
      # Ubuntu ships the compiler WITHOUT a libc, so we additionally
      # install picolibc-riscv64-unknown-elf for the picolibc
      # headers (the riscv32 toolchain file points GCC at picolibc
      # via --specs=). Both toolchains install in parallel and the
      # job's matrix entry selects which one runs.
      - name: Install cross toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              gcc-arm-none-eabi \
              gcc-riscv64-unknown-elf \
              picolibc-riscv64-unknown-elf \
              cmake ninja-build

      # Cross-configure with the target toolchain file and the
      # CVM_NO_STDLIB_FALLBACK gate. The toolchain sets
      # CVM_EMBEDDED_SANITY_BUILD=ON, which makes the top-level
      # CMakeLists skip host-only targets (tests, cvm-cc,
      # cvm-translate, embedder fixtures, install rules) and wire
      # a POST_BUILD nm allowlist check onto libcvm.a.
      - name: Configure (${{ matrix.target.name }} + NO_STDLIB_FALLBACK)
        run: >-
          cmake -B ${{ matrix.target.build }} -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/${{ matrix.target.toolchain }}
          -DCVM_NO_STDLIB_FALLBACK=ON

      # `cmake --build` triggers the POST_BUILD command on libcvm.a,
      # which runs `nm --undefined-only` and fails the build if any
      # symbol falls outside cmake/cortex_m_allowed_symbols.txt. No
      # ctest step — the build itself is the test.
      - name: Build + nm allowlist check
        run: cmake --build ${{ matrix.target.build }}

  windows:
    runs-on: windows-latest
    name: windows-ucrt64-clang
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # external/picolibc: the conformance test
                                   # builds picolibc.bc from it (else it fails)

      # The local dev environment is MSYS2 UCRT64; match it on CI so
      # llvm-config / clang behave identically to what the maintainer
      # tests against.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-llvm
            mingw-w64-ucrt-x86_64-libc++
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos:
    runs-on: macos-latest
    name: macos-clang
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # external/picolibc: the conformance test
                                   # builds picolibc.bc from it (else it fails)

      # Apple Clang ships without llvm-config (it's part of an internal
      # toolchain). Brew's LLVM keg gets the standalone tools, including
      # llvm-config and a clang that supports --target=i386-elf for
      # fixture compilation.
      - name: Install LLVM via brew
        run: |
          brew update
          brew install llvm cmake ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
